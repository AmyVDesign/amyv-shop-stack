name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Typecheck, lint, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '11.1.2'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (@amyv/esskay)
        run: pnpm --filter @amyv/esskay typecheck

      - name: Lint (@amyv/esskay)
        run: pnpm --filter @amyv/esskay lint

      - name: Test (@amyv/esskay)
        run: pnpm --filter @amyv/esskay test
